name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
        
      - name: Run tests
        run: flutter test
        
      - name: Run analysis
        run: flutter analyze
        
      - name: Check formatting
        run: flutter format --set-exit-if-changed .
        
      - name: Build for all platforms (dry run)
        run: flutter build web --debug

  functions-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cloud Functions dependencies
        working-directory: functions
        run: npm ci

      - name: Build (tsc)
        working-directory: functions
        run: npm run build

      - name: Run Cloud Functions tests
        working-directory: functions
        run: npm test

  functions-integration:
    # Categoria C del piano: test d'integrazione sulle callable enrollment
    # contro la Firebase Emulator Suite reale (transazioni, atomicità,
    # concorrenza/contention). Project demo-* = offline-only, nessuna credenziale.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java (richiesto dall'emulatore Firestore)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install firebase-tools
        run: npm install -g firebase-tools@15

      - name: Install Cloud Functions dependencies
        working-directory: functions
        run: npm ci

      - name: Run integration tests on Emulator Suite
        working-directory: functions
        env:
          # Secret fittizio per defineSecret nell'emulatore (notifiche best-effort).
          ONESIGNAL_REST_API_KEY: emulator-dummy-key
        run: npm run test:integration
