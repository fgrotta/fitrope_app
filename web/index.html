<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="title" content="Fit House">
  <meta name="description" content="App per la gestione dei corsi di fitness">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Fit House Monza">
  <link rel="apple-touch-icon" href="icons/Icon-192.png?v=20260425">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=20260425"/>
  <link rel="icon" type="image/x-icon" href="favicon.ico?v=20260425"/>
  <link rel="shortcut icon" href="favicon.ico?v=20260425"/>

  <title>Fit House</title>
  <link rel="manifest" href="manifest.json?v=20260425">
  
  <!-- Meta tag per impedire caching di version.json -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
    }
    
    .logo-container {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .logo {
      
      height: 200px;
      margin-bottom: 20px;
    }
    
    .loader {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      margin-top: 20px;
      font-size: 1.2rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <img src="assets/assets/new_logo_only.png" alt="Fit House" class="logo">
  </div>
  
  <div class="loader"></div>
  
  <script>
    // Version checking logic
    let currentVersion = null;
    let checkInterval = null;
    
    async function getCurrentVersion() {
      try {
        const response = await fetch('version.json?t=' + Date.now());
        const data = await response.json();
        
        return data.build_number || data.version;
      } catch (error) {
        console.error('Errore nel recupero della versione:', error);
        return null;
      }
    }
    
    async function checkForUpdates() {
      try {
        const serverVersion = await getCurrentVersion();
        
        if (currentVersion === null) {
          // Prima chiamata: salva la versione corrente
          currentVersion = serverVersion;
          console.log('Versione corrente:', currentVersion);
          return;
        }
        
        if (serverVersion && serverVersion !== currentVersion) {
          console.log('Nuova versione rilevata:', serverVersion, 'vs', currentVersion);
          console.log('Eseguendo aggiornamento automatico...');
          forceUpdate();
        }
      } catch (error) {
        console.error('Errore nel controllo aggiornamenti:', error);
      }
    }
    
    async function forceUpdate() {
      try {
        // Registra il service worker se disponibile
        if ('serviceWorker' in navigator) {
          const registration = await navigator.serviceWorker.ready;
          
          // Invia messaggio al service worker per forzare l'aggiornamento
          if (registration.active) {
            registration.active.postMessage('skipWaiting');
          }
          
          // Forza il reload della pagina
          window.location.reload(true);
        } else {
          // Fallback: semplice reload
          window.location.reload(true);
        }
      } catch (error) {
        console.error('Errore nell\'aggiornamento:', error);
        // Fallback: semplice reload
        window.location.reload(true);
      }
    }
    
    // Inizia il controllo periodico dopo 30 secondi dall'avvio
    setTimeout(() => {
      checkForUpdates();
      
      // Controlla aggiornamenti ogni 5 minuti (300000 ms)
      checkInterval = setInterval(checkForUpdates, 300000);
    }, 30000);
    
    // Controlla aggiornamenti al focus della finestra
    window.addEventListener('focus', checkForUpdates);
    
    // Controlla aggiornamenti al caricamento
    window.addEventListener('load', () => {
      setTimeout(checkForUpdates, 1000);
    });
  </script>
  
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];

    function fitHouseBasePath() {
      const baseElement = document.querySelector('base');
      const rawBase = baseElement ? (baseElement.getAttribute('href') || '/') : '/';
      const resolvedBase = new URL(rawBase, window.location.origin).pathname;
      return resolvedBase.endsWith('/') ? resolvedBase : resolvedBase + '/';
    }

    function fitHouseScopedPath(path) {
      return fitHouseBasePath() + path;
    }

    function withOneSignal(action, label) {
      const initPromise = window.__fitHouseOneSignalInitPromise || Promise.resolve();
      initPromise.then(() => {
        window.OneSignalDeferred.push(async function(OneSignal) {
          try {
            await action(OneSignal);
          } catch (error) {
            console.error('[OneSignal Web] ' + label + ' error:', error);
          }
        });
      });
    }

    window.oneSignalInit = function(appId) {
      if (window.__fitHouseOneSignalInitPromise) {
        return;
      }

      window.__fitHouseOneSignalInitPromise = new Promise((resolve) => {
        window.OneSignalDeferred.push(async function(OneSignal) {
          try {
            if (!OneSignal.Notifications.isPushSupported()) {
              console.info('[OneSignal Web] Push non supportate da questo browser');
              resolve();
              return;
            }

            const workerScope = fitHouseScopedPath('push/onesignal/');
            const workerPath = workerScope + 'OneSignalSDKWorker.js';
            console.info('[OneSignal Web] init config:', {
              workerPath: workerPath,
              workerScope: workerScope,
            });

            await OneSignal.init({
              appId: appId,
              serviceWorkerPath: workerPath,
              serviceWorkerParam: {
                scope: workerScope,
              },
            });
          } catch (error) {
            console.error('[OneSignal Web] init error:', error, String(error));
          }

          resolve();
        });
      });
    };

    window.oneSignalLogin = function(userId) {
      withOneSignal(async function(OneSignal) {
        await OneSignal.login(userId);
      }, 'login');
    };

    window.oneSignalLogout = function() {
      withOneSignal(async function(OneSignal) {
        await OneSignal.logout();
      }, 'logout');
    };

    window.oneSignalAddEmail = function(email) {
      withOneSignal(async function(OneSignal) {
        await OneSignal.User.addEmail(email);
      }, 'addEmail');
    };

    window.oneSignalRemoveEmail = function(email) {
      withOneSignal(async function(OneSignal) {
        await OneSignal.User.removeEmail(email);
      }, 'removeEmail');
    };

    window.oneSignalSyncPushPreference = function(enabled) {
      withOneSignal(async function(OneSignal) {
        if (!OneSignal.Notifications.isPushSupported()) {
          return;
        }

        if (enabled) {
          if (OneSignal.Notifications.permission === true) {
            await OneSignal.User.PushSubscription.optIn();
          }
          return;
        }

        await OneSignal.User.PushSubscription.optOut();
      }, 'syncPushPreference');
    };

    window.oneSignalSetPushEnabled = function(enabled) {
      withOneSignal(async function(OneSignal) {
        if (!OneSignal.Notifications.isPushSupported()) {
          return;
        }

        if (enabled) {
          await OneSignal.User.PushSubscription.optIn();
          return;
        }

        await OneSignal.User.PushSubscription.optOut();
      }, 'setPushEnabled');
    };

    window.oneSignalHasPushPermission = function() {
      if (!window.Notification) {
        return false;
      }

      return Notification.permission === 'granted';
    };

    window.oneSignalCanRequestPushPermission = function() {
      if (!window.Notification) {
        return false;
      }

      return Notification.permission === 'default';
    };
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
