<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="title" content="Fit House">
  <meta name="description" content="App per la gestione dei corsi di fitness">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Fit House Monza">
  <link rel="apple-touch-icon" href="icons/Icon-192.png?v=20260425">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=20260425"/>
  <link rel="icon" type="image/x-icon" href="favicon.ico?v=20260425"/>
  <link rel="shortcut icon" href="favicon.ico?v=20260425"/>

  <title>Fit House</title>
  <link rel="manifest" href="manifest.json?v=20260425">
  
  <!-- Meta tag per impedire caching di version.json -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
    }
    
    .logo-container {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .logo {
      
      height: 200px;
      margin-bottom: 20px;
    }
    
    .loader {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      margin-top: 20px;
      font-size: 1.2rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <img src="assets/assets/new_logo_only.png" alt="Fit House" class="logo">
  </div>
  
  <div class="loader"></div>
  
  <script>
    // ID build "timbrato" in fase di build da tool/build_web.sh (sostituisce
    // il placeholder). Su un nuovo deploy index.html cambia, quindi una shell
    // appena caricata ottiene il nuovo numero; una shell VECCHIA in cache
    // mantiene il numero precedente e farà mismatch con version.json -> update.
    window.APP_BUILD_VERSION = "__APP_BUILD_VERSION__";

    // Si parte dall'id timbrato, NON dal primo fetch di rete: così una shell
    // obsoleta sa subito di essere indietro rispetto al server.
    let currentVersion = window.APP_BUILD_VERSION;
    let checkInterval = null;
    const RELOAD_GUARD_KEY = 'fh_update_attempts';
    const MAX_RELOAD_ATTEMPTS = 2;

    // Sentinella costruita a runtime (concatenata) così il build NON la
    // sostituisce. Se currentVersion è ancora il placeholder, significa che
    // la shell NON è stata timbrata (dev/debug, oppure build senza
    // tool/build_web.sh): in quel caso l'auto-update va disattivato del tutto
    // per evitare falsi positivi contro il version.json generato da Flutter.
    const UNSTAMPED_VERSION = '__APP_BUILD' + '_VERSION__';
    const updatesEnabled = !!currentVersion && currentVersion !== UNSTAMPED_VERSION;
    if (!updatesEnabled) {
      console.info('[update] Auto-update disabilitato: build non timbrata (dev/debug).');
    }

    async function getServerVersion() {
      try {
        const response = await fetch('version.json?t=' + Date.now(), { cache: 'no-store' });
        if (!response.ok) return null;
        const data = await response.json();
        return String(data.build_number || data.version);
      } catch (error) {
        console.error('Errore nel recupero della versione:', error);
        return null;
      }
    }

    async function checkForUpdates() {
      if (!updatesEnabled) return; // build non timbrata: nessun controllo
      const serverVersion = await getServerVersion();
      if (!serverVersion) return; // offline / version.json assente: non fare nulla
      if (serverVersion === currentVersion) {
        // Allineati: azzera il guard anti-loop.
        try { sessionStorage.removeItem(RELOAD_GUARD_KEY); } catch (e) {}
        return;
      }
      console.log('Nuova versione rilevata:', serverVersion, 'vs', currentVersion);
      forceUpdate(serverVersion);
    }

    async function forceUpdate(serverVersion) {
      // Guard anti-loop: se i reload non risolvono, mostra il banner.
      let attempts = 0;
      try { attempts = parseInt(sessionStorage.getItem(RELOAD_GUARD_KEY) || '0', 10); } catch (e) {}
      if (attempts >= MAX_RELOAD_ATTEMPTS) {
        showUpdateBanner(serverVersion);
        return;
      }
      try { sessionStorage.setItem(RELOAD_GUARD_KEY, String(attempts + 1)); } catch (e) {}

      try {
        // 1. Deregistra TUTTI i service worker (Flutter + OneSignal).
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map((r) => r.unregister()));
        }
        // 2. Svuota TUTTE le CacheStorage (app-shell Flutter, ecc.).
        if (window.caches && caches.keys) {
          const keys = await caches.keys();
          await Promise.all(keys.map((k) => caches.delete(k)));
        }
      } catch (error) {
        console.error('Errore nel teardown cache/service worker:', error);
      }

      // 3. Navigazione cache-busted: Safari non può servire la HTML dalla
      //    cache HTTP se l'URL cambia.
      try {
        const url = new URL(window.location.href);
        url.searchParams.set('v', serverVersion);
        window.location.replace(url.toString());
      } catch (error) {
        window.location.reload();
      }
    }

    function showUpdateBanner(serverVersion) {
      if (document.getElementById('fh-update-banner')) return;
      const bar = document.createElement('div');
      bar.id = 'fh-update-banner';
      bar.style.cssText =
        'position:fixed;left:0;right:0;bottom:0;z-index:999999;background:#111;' +
        'color:#fff;padding:14px;text-align:center;font-size:15px;';
      bar.innerHTML =
        'È disponibile una nuova versione. ' +
        '<button id="fh-update-btn" style="margin-left:10px;padding:6px 14px;' +
        'border:0;border-radius:6px;background:#fff;color:#111;font-weight:600;">' +
        'Aggiorna</button>';
      document.body.appendChild(bar);
      document.getElementById('fh-update-btn').addEventListener('click', function () {
        try { sessionStorage.removeItem(RELOAD_GUARD_KEY); } catch (e) {}
        forceUpdate(serverVersion);
      });
    }

    // Controlla all'avvio, al focus e quando la pagina torna visibile (PWA).
    window.addEventListener('load', () => setTimeout(checkForUpdates, 1500));
    window.addEventListener('focus', checkForUpdates);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') checkForUpdates();
    });
    // Poll periodico ogni 5 minuti.
    setTimeout(() => { checkInterval = setInterval(checkForUpdates, 300000); }, 30000);
  </script>
  
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];

    function fitHouseBasePath() {
      const baseElement = document.querySelector('base');
      const rawBase = baseElement ? (baseElement.getAttribute('href') || '/') : '/';
      const resolvedBase = new URL(rawBase, window.location.origin).pathname;
      return resolvedBase.endsWith('/') ? resolvedBase : resolvedBase + '/';
    }

    function fitHouseScopedPath(path) {
      return fitHouseBasePath() + path;
    }

    function withOneSignal(action, label) {
      const initPromise = window.__fitHouseOneSignalInitPromise || Promise.resolve();
      initPromise.then(() => {
        window.OneSignalDeferred.push(async function(OneSignal) {
          try {
            await action(OneSignal);
          } catch (error) {
            console.error('[OneSignal Web] ' + label + ' error:', error);
          }
        });
      });
    }

    window.oneSignalInit = function(appId) {
      if (window.__fitHouseOneSignalInitPromise) {
        return;
      }

      window.__fitHouseOneSignalInitPromise = new Promise((resolve) => {
        window.OneSignalDeferred.push(async function(OneSignal) {
          try {
            if (!OneSignal.Notifications.isPushSupported()) {
              console.info('[OneSignal Web] Push non supportate da questo browser');
              resolve();
              return;
            }

            const workerScope = fitHouseScopedPath('push/onesignal/');
            const workerPath = workerScope + 'OneSignalSDKWorker.js';
            console.info('[OneSignal Web] init config:', {
              workerPath: workerPath,
              workerScope: workerScope,
            });

            await OneSignal.init({
              appId: appId,
              serviceWorkerPath: workerPath,
              serviceWorkerParam: {
                scope: workerScope,
              },
            });
          } catch (error) {
            console.error('[OneSignal Web] init error:', error, String(error));
          }

          resolve();
        });
      });
    };

    window.oneSignalLogin = function(userId) {
      withOneSignal(async function(OneSignal) {
        await OneSignal.login(userId);
      }, 'login');
    };

    window.oneSignalLogout = function() {
      withOneSignal(async function(OneSignal) {
        await OneSignal.logout();
      }, 'logout');
    };

    window.oneSignalAddEmail = function(email) {
      withOneSignal(async function(OneSignal) {
        await OneSignal.User.addEmail(email);
      }, 'addEmail');
    };

    window.oneSignalRemoveEmail = function(email) {
      withOneSignal(async function(OneSignal) {
        await OneSignal.User.removeEmail(email);
      }, 'removeEmail');
    };

    window.oneSignalSyncPushPreference = function(enabled) {
      withOneSignal(async function(OneSignal) {
        if (!OneSignal.Notifications.isPushSupported()) {
          return;
        }

        if (enabled) {
          if (OneSignal.Notifications.permission === true) {
            await OneSignal.User.PushSubscription.optIn();
          }
          return;
        }

        await OneSignal.User.PushSubscription.optOut();
      }, 'syncPushPreference');
    };

    window.oneSignalSetPushEnabled = function(enabled) {
      withOneSignal(async function(OneSignal) {
        if (!OneSignal.Notifications.isPushSupported()) {
          return;
        }

        if (enabled) {
          await OneSignal.User.PushSubscription.optIn();
          return;
        }

        await OneSignal.User.PushSubscription.optOut();
      }, 'setPushEnabled');
    };

    window.oneSignalHasPushPermission = function() {
      if (!window.Notification) {
        return false;
      }

      return Notification.permission === 'granted';
    };

    window.oneSignalCanRequestPushPermission = function() {
      if (!window.Notification) {
        return false;
      }

      return Notification.permission === 'default';
    };
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
